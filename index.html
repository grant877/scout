}

const SWIPE_LEFT={restaurants:"NEXT TABLE",hotels:"NEXT ROOM",experiences:"NEXT ONE"};
const CONF_LABEL={restaurants:"RESERVATION CONFIRMED",hotels:"STAY CONFIRMED",experiences:"EXPERIENCE BOOKED"};
const CTA_LABEL={restaurants:"FIND ANOTHER RESTAURANT",hotels:"FIND ANOTHER STAY",experiences:"FIND ANOTHER EXPERIENCE"};

function fmtChip(key,val,cat){
  if(!val)return null;
  if(key==="city")return val+", "+CITY_ST[val];
  if(key==="party"){if(cat==="hotels")return val+(val!=="1"&&val!=="Suite"?" rooms":" room");return val+(val!=="1"?" guests":" guest");}
  if(key==="when"){
    if(val.checkin&&val.checkout)return MON_SHORT[val.checkin.getMonth()]+" "+val.checkin.getDate()+" → "+MON_SHORT[val.checkout.getMonth()]+" "+val.checkout.getDate();
    if(val.checkin)return MON_SHORT[val.checkin.getMonth()]+" "+val.checkin.getDate()+" →";
    if(val.date){let s=MON_SHORT[val.date.getMonth()]+" "+val.date.getDate();if(val.timeRange)s+=" · "+val.timeRange;return s;}
    return null;
  }
  if(key==="rating")return val+" min";
  return val;
}

function MiniCalendar({mode,value,onChange}){
  const today=new Date();
  const [vy,setVY]=useState(today.getFullYear());
  const [vm,setVM]=useState(today.getMonth());
  const prevM=()=>{if(vm===0){setVM(11);setVY(y=>y-1);}else setVM(m=>m-1);};
  const nextM=()=>{if(vm===11){setVM(0);setVY(y=>y+1);}else setVM(m=>m+1);};
  const dim=new Date(vy,vm+1,0).getDate();
  const fd=new Date(vy,vm,1).getDay();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  const dateOf=d=>new Date(vy,vm,d);
  const sameDay=(a,b)=>a&&b&&a.toDateString()===b.toDateString();
  const todayStart=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  const getStatus=day=>{
    if(!day)return"empty";
    const d=dateOf(day);
    if(d<todayStart)return"past";
    const v=value||{};
    if(mode==="range"){if(sameDay(d,v.checkin))return"start";if(sameDay(d,v.checkout))return"end";if(v.checkin&&v.checkout&&d>v.checkin&&d<v.checkout)return"mid";}
    else{if(sameDay(d,v.date))return"selected";}
    return"normal";
  };
  const handleDay=day=>{
    const d=dateOf(day);
    if(d<todayStart)return;
    if(mode==="range"){const v=value||{};if(!v.checkin||(v.checkin&&v.checkout)){onChange({checkin:d,checkout:null});}else{if(d>v.checkin)onChange({checkin:v.checkin,checkout:d});else onChange({checkin:d,checkout:null});}}
    else{onChange({...((value)||{}),date:d});}
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <button onClick={prevM} style={{background:"none",border:"none",color:C.secondary,cursor:"pointer",fontSize:22,padding:"0 6px",fontFamily:F}}>‹</button>
        <span style={{color:C.primary,fontSize:13,fontWeight:600,fontFamily:F}}>{MON_SHORT[vm]} {vy}</span>
        <button onClick={nextM} style={{background:"none",border:"none",color:C.secondary,cursor:"pointer",fontSize:22,padding:"0 6px",fontFamily:F}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>
        {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",color:C.muted,fontSize:10,fontFamily:F,padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((day,i)=>{
          const st=getStatus(day);
          const isSel=st==="selected"||st==="start"||st==="end";
          const isMid=st==="mid";
          const isPast=st==="past";
          return <button key={i} onClick={()=>{if(day&&st!=="past")handleDay(day);}} style={{background:isSel?C.primary:isMid?C.surfaceHi:"transparent",color:isSel?"#000":isPast||!day?C.border:C.secondary,border:"none",borderRadius:4,padding:"7px 0",fontSize:12,fontFamily:F,fontWeight:isSel?700:400,cursor:day&&!isPast?"pointer":"default",textAlign:"center",transition:"all 0.12s"}}>{day||""}</button>;
        })}
      </div>
      {mode==="single"&&(
        <div style={{marginTop:16}}>
          <div style={{color:C.muted,fontSize:10,letterSpacing:"0.1em",marginBottom:10,fontFamily:F}}>TIME</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {TIME_OPTS.map(t=>{const active=value&&value.timeRange===t;return <button key={t} onClick={()=>onChange({...((value)||{}),timeRange:active?null:t})} style={{background:active?C.primary:"transparent",color:active?"#000":C.secondary,border:"1px solid "+(active?C.primary:C.border),borderRadius:2,padding:"6px 12px",fontSize:11,fontFamily:F,fontWeight:active?600:400,cursor:"pointer",transition:"all 0.12s"}}>{t}</button>;})}
          </div>
        </div>
      )}
      {mode==="range"&&value&&value.checkin&&<div style={{marginTop:12,color:C.tertiary,fontSize:11,fontFamily:F}}>{value.checkout?"Check-out: "+MON_SHORT[value.checkout.getMonth()]+" "+value.checkout.getDate():"Now select check-out date"}</div>}
    </div>
  );
}

function PhotoGallery({photos,color}){
  const [idx,setIdx]=useState(0);
  const [errs,setErrs]=useState({});
  const ref=useRef(null);
  const onScroll=()=>{if(!ref.current)return;setIdx(Math.round(ref.current.scrollLeft/ref.current.offsetWidth));};
  const goTo=i=>{setIdx(i);if(ref.current)ref.current.scrollTo({left:i*ref.current.offsetWidth,behavior:"smooth"});};
  return(
    <div style={{position:"relative",width:"100%",height:260,borderRadius:"12px 12px 0 0",overflow:"hidden",background:"linear-gradient(160deg,"+color+",#020202)"}}>
      <div ref={ref} onScroll={onScroll} style={{display:"flex",width:"100%",height:"100%",overflowX:"scroll",scrollSnapType:"x mandatory",scrollbarWidth:"none"}}>
        {photos.map((url,i)=>(
          <div key={i} style={{flexShrink:0,width:"100%",height:"100%",scrollSnapAlign:"start",position:"relative"}}>
            {!errs[i]&&<img src={url} alt="" onError={()=>setErrs(e=>({...e,[i]:true}))} style={{width:"100%",height:"100%",objectFit:"cover"}}/>}
            <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.55) 0%,transparent 50%)"}}/>
          </div>
        ))}
      </div>
      <div style={{position:"absolute",bottom:12,left:0,right:0,display:"flex",justifyContent:"center",gap:5}}>
        {photos.map((_,i)=><button key={i} onClick={()=>goTo(i)} style={{width:i===idx?16:5,height:5,borderRadius:3,background:i===idx?C.primary:"rgba(255,255,255,0.3)",border:"none",cursor:"pointer",padding:0,transition:"all 0.2s"}}/>)}
      </div>
    </div>
  );
}

            <span style={{color:C.primary,fontFamily:F,fontWeight:700,fontSize:13,marginLeft:"auto"}}>{item.price}</span>

function App(){
  const [splash,setSplash]=useState(true);
  const [splashFade,setSplashFade]=useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setSplashFade(true),1800);
    const t2=setTimeout(()=>setSplash(false),2500);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);

  const [activeCat,setActiveCat]=useState("restaurants");
  const [filters,setFilters]=useState({city:"Detroit"});
  const [sheetOpen,setSheetOpen]=useState(false);
  const [detailOpen,setDetailOpen]=useState(false);
  const [cardIdx,setCardIdx]=useState({restaurants:0,hotels:0,experiences:0});
  const [booked,setBooked]=useState(null);
  const [selTime,setSelTime]=useState(null);
  const [dragX,setDragX]=useState(0);
  const [swipeDir,setSwipeDir]=useState(null);
  const [hintDir,setHintDir]=useState(null);
  const [isSnapping,setIsSnapping]=useState(false);

  const txX=useRef(null),txY=useRef(null),txT=useRef(null),isDrag=useRef(false);
  const mxX=useRef(null),mxT=useRef(null),isMDrag=useRef(false),wasDrag=useRef(false);

  useEffect(()=>{
    if(sheetOpen||booked||detailOpen)return;
    const onMove=e=>{if(!isMDrag.current)return;const dx=e.clientX-mxX.current;setDragX(dx);setHintDir(dx>30?"right":dx<-30?"left":null);if(Math.abs(dx)>5)wasDrag.current=true;};
    const onUp=e=>{if(!isMDrag.current)return;const dx=e.clientX-mxX.current;const vel=dx/(Date.now()-mxT.current);if(wasDrag.current){if(Math.abs(vel)>0.35||Math.abs(dx)>110)doSwipe(dx>0?"right":"left");else snapBack();}isMDrag.current=false;};
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
    return()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);};
  },[sheetOpen,booked,detailOpen,activeCat]);

  const cityItems=DATA[activeCat][filters.city||"Detroit"]||[];
  const filtered=cityItems.filter(r=>{
    if(filters.cuisine&&r.cuisine!==filters.cuisine)return false;
    if(filters.type&&r.type!==filters.type)return false;
    if(filters.price){const m={Budget:"$","Mid-Range":"$$",Upscale:"$$$",Luxury:"$$$$"};if(!r.price.startsWith(m[filters.price]||filters.price))return false;}
    if(filters.rating&&r.rating<parseFloat(filters.rating))return false;
    return true;
  });
  const ci=cardIdx[activeCat];
  const safeLen=Math.max(filtered.length,1);
  const current=filtered[ci%safeLen];
  const next=filtered[(ci+1)%safeLen];

  const snapBack=()=>{setIsSnapping(true);setDragX(0);setHintDir(null);setTimeout(()=>setIsSnapping(false),350);};
  const doSwipe=dir=>{
    if(swipeDir)return;
    setDetailOpen(false);setSwipeDir(dir);setDragX(0);setHintDir(null);
    setTimeout(()=>{setSwipeDir(null);if(dir==="right"&&current){setBooked(current);setSelTime(null);}else setCardIdx(c=>({...c,[activeCat]:c[activeCat]+1}));},400);
  };

  const onTouchStart=e=>{if(sheetOpen||detailOpen)return;txX.current=e.touches[0].clientX;txY.current=e.touches[0].clientY;txT.current=Date.now();isDrag.current=false;};
  const onTouchMove=e=>{
    if(sheetOpen||detailOpen||!txX.current)return;
    const dx=e.touches[0].clientX-txX.current,dy=e.touches[0].clientY-txY.current;
    if(!isDrag.current){if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)isDrag.current=true;else if(Math.abs(dy)>12){txX.current=null;return;}}
    if(isDrag.current){e.preventDefault();setDragX(dx);setHintDir(dx>30?"right":dx<-30?"left":null);}
  };
  const onTouchEnd=e=>{
    if(sheetOpen||detailOpen)return;
    const dx=txX.current?e.changedTouches[0].clientX-txX.current:0;
    const dy=txX.current?e.changedTouches[0].clientY-txY.current:0;
    if(!isDrag.current&&Math.abs(dx)<8&&Math.abs(dy)<8&&txX.current!==null){setDetailOpen(true);txX.current=null;return;}
    if(isDrag.current){const dt=Date.now()-txT.current;if(Math.abs(dx/dt)>0.35||Math.abs(dx)>110)doSwipe(dx>0?"right":"left");else snapBack();}
    txX.current=null;isDrag.current=false;
  };
  const onMouseDown=e=>{if(sheetOpen||detailOpen)return;mxX.current=e.clientX;mxT.current=Date.now();isMDrag.current=true;wasDrag.current=false;};
  const onCardClick=()=>{if(!wasDrag.current&&!sheetOpen&&!detailOpen)setDetailOpen(true);wasDrag.current=false;};

  const setFilter=(key,val)=>{
    setFilters(f=>{if(key!=="city"&&f[key]===val){const nf={...f};delete nf[key];return nf;}return{...f,[key]:val};});
    if(key==="city")setCardIdx({restaurants:0,hotels:0,experiences:0});
  };
  const removeChip=key=>{if(key==="city")return;setFilters(f=>{const nf={...f};delete nf[key];return nf;});};

  const CHIP_ORDER=["city","when","party","cuisine","type","price","rating"];
  const chips=CHIP_ORDER.filter(k=>filters[k]).map(k=>({key:k,label:fmtChip(k,filters[k],activeCat)})).filter(c=>c.label);
  const animX=swipeDir==="right"?600:swipeDir==="left"?-600:dragX;
  const animRot=swipeDir==="right"?28:swipeDir==="left"?-28:dragX/14;
  const animating=!!swipeDir;
  const oa=Math.min(Math.abs(dragX)/100,1);
  const fDefs=FILTER_DEFS[activeCat];

  return(
    <div style={{height:"100vh",background:BG,display:"flex",flexDirection:"column",alignItems:"center",fontFamily:F,overflow:"hidden",position:"relative"}}>
      {/* Splash */}
      {splash&&(
        <div style={{position:"fixed",inset:0,background:BG,zIndex:999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:splashFade?0:1,transition:"opacity 0.7s ease-out",pointerEvents:splashFade?"none":"auto"}}>
          <div style={{textAlign:"center"}}>
            <div style={{color:C.primary,fontWeight:700,fontSize:42,letterSpacing:"0.22em",fontFamily:F,marginBottom:16}}>SCOUT</div>
            <div style={{color:C.muted,fontSize:13,letterSpacing:"0.12em",fontFamily:F}}>Stop searching. Start going.</div>
          </div>
        </div>
      )}
      <div style={{width:"100%",maxWidth:440,flex:1,display:"flex",flexDirection:"column",boxSizing:"border-box",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"22px 24px 0",flexShrink:0}}>
          <span style={{color:C.primary,fontWeight:700,fontSize:17,letterSpacing:"0.18em"}}>SCOUT</span>
        </div>
        {/* Tabs */}
        <div style={{display:"flex",padding:"14px 0 0",borderBottom:"1px solid "+C.border,flexShrink:0}}>
          {[{key:"restaurants",label:"Eat"},{key:"hotels",label:"Stay"},{key:"experiences",label:"Play"}].map(tab=>{
            const active=activeCat===tab.key;
            return <button key={tab.key} onClick={()=>setActiveCat(tab.key)} style={{flex:1,background:"none",border:"none",borderBottom:"3px solid "+(active?C.primary:"transparent"),padding:"0 0 12px",color:active?C.primary:C.muted,fontFamily:F,fontSize:21,fontWeight:active?700:400,cursor:"pointer",marginBottom:-1,transition:"all 0.18s"}}>{tab.label}</button>;
          })}
        </div>
        {/* Context bar */}
        <div style={{padding:"10px 24px 8px",display:"flex",alignItems:"center",gap:8,minHeight:42,flexShrink:0}}>
          <div style={{display:"flex",gap:6,flex:1,alignItems:"center",overflowX:"auto",scrollbarWidth:"none",flexWrap:"nowrap"}}>
            {chips.length===0
              ?<span style={{color:C.muted,fontSize:11,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>Use filter to narrow results</span>
              :chips.map(chip=>(
                <button key={chip.key} onClick={()=>removeChip(chip.key)} style={{background:chip.key==="city"?"transparent":C.surfaceHi,color:chip.key==="city"?C.tertiary:C.primary,border:"1px solid "+(chip.key==="city"?C.border:C.borderHi),borderRadius:20,padding:"4px 10px",fontSize:11,fontFamily:F,cursor:chip.key==="city"?"default":"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                  {chip.label}{chip.key!=="city"&&<span style={{color:C.muted,fontSize:9}}>×</span>}
                </button>
              ))
            }
          </div>
          <button onClick={()=>setSheetOpen(true)} style={{background:"none",border:"1px solid "+(sheetOpen?C.primary:C.border),borderRadius:6,padding:"6px 10px",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",gap:5}}>
            <svg width="14" height="11" viewBox="0 0 14 11" fill="none">
              <line x1="0" y1="1.5" x2="14" y2="1.5" stroke={C.secondary} strokeWidth="1.2"/>
              <line x1="0" y1="5.5" x2="14" y2="5.5" stroke={C.secondary} strokeWidth="1.2"/>
              <line x1="0" y1="9.5" x2="14" y2="9.5" stroke={C.secondary} strokeWidth="1.2"/>
              <circle cx="4.5" cy="1.5" r="2" fill={BG} stroke={C.secondary} strokeWidth="1.2"/>
              <circle cx="9.5" cy="5.5" r="2" fill={BG} stroke={C.secondary} strokeWidth="1.2"/>
              <circle cx="5.5" cy="9.5" r="2" fill={BG} stroke={C.secondary} strokeWidth="1.2"/>
            </svg>
            <span style={{color:C.secondary,fontSize:10,letterSpacing:"0.08em"}}>FILTER</span>
          </button>
        </div>
        {/* Cards */}
        <div style={{flex:1,padding:"6px 16px 0",position:"relative",overflow:"hidden"}}>
          <div style={{position:"relative",width:"100%",height:"100%",userSelect:"none"}}>
            {next&&filtered.length>1&&(
              <div style={{position:"absolute",top:10,left:8,right:8,bottom:10,borderRadius:14,overflow:"hidden",opacity:0.28,transform:"scale(0.95)"}}>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,"+next.color+",#020202)"}}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.1))"}}/>
              </div>
            )}
            {current&&(
              <div onMouseDown={onMouseDown} onClick={onCardClick} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
                style={{position:"absolute",top:0,left:0,right:0,bottom:0,borderRadius:14,overflow:"hidden",cursor:"grab",
                  transform:"translateX("+animX+"px) rotate("+animRot+"deg)",
                  transition:animating?"transform 0.4s cubic-bezier(0.6,-0.2,0.74,0.05),opacity 0.4s":isSnapping?"transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)":"none",
                  opacity:animating?0:1,boxShadow:"0 20px 60px rgba(0,0,0,0.9)",touchAction:"pan-y"}}>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,"+current.color+",#020202)"}}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.97) 0%,rgba(0,0,0,0.2) 52%,transparent 100%)"}}/>
                <div style={{position:"absolute",top:16,right:16,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(8px)",borderRadius:3,padding:"5px 10px",display:"flex",alignItems:"baseline",gap:3}}>
                  <span style={{color:C.primary,fontWeight:700,fontSize:15}}>{current.rating}</span>
                  <span style={{color:C.tertiary,fontSize:9}}>/5</span>
                </div>
                <div style={{position:"absolute",top:16,left:16,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",borderRadius:3,padding:"4px 10px"}}>
                  <span style={{color:"rgba(255,255,255,0.4)",fontSize:9,letterSpacing:"0.1em"}}>TAP FOR MORE</span>
                </div>
                {hintDir==="left"&&(
                  <div style={{position:"absolute",inset:0,zIndex:5,pointerEvents:"none",background:"rgba(0,0,0,"+(oa*0.22)+")"}}>
                    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:Math.max(0,oa*1.6-0.15)}}>
                      <div style={{width:72,height:72,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.75)",display:"flex",alignItems:"center",justifyContent:"center",transform:"scale("+(0.55+oa*0.5)+")",marginBottom:12}}>
                        <svg width="26" height="26" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="rgba(255,255,255,0.85)" strokeWidth="1.8" strokeLinecap="round"/></svg>
                      </div>
                      <span style={{color:"rgba(255,255,255,0.75)",fontSize:11,letterSpacing:"0.2em",fontFamily:F,fontWeight:600}}>{SWIPE_LEFT[activeCat]}</span>
                    </div>
                  </div>
                )}
                {hintDir==="right"&&(
                  <div style={{position:"absolute",inset:0,zIndex:5,pointerEvents:"none",background:"rgba(255,255,255,"+(oa*0.1)+")"}}>
                    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:Math.max(0,oa*1.6-0.15)}}>
                      <div style={{width:72,height:72,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.9)",display:"flex",alignItems:"center",justifyContent:"center",transform:"scale("+(0.55+oa*0.5)+")",marginBottom:12}}>
                        <svg width="28" height="22" viewBox="0 0 24 18" fill="none"><path d="M2 9L9 16L22 2" stroke="rgba(255,255,255,0.9)" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                      </div>
                      <span style={{color:"rgba(255,255,255,0.9)",fontSize:11,letterSpacing:"0.2em",fontFamily:F,fontWeight:600}}>RESERVE</span>
                    </div>
                  </div>
                )}
                <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"0 20px 20px",zIndex:4}}>
                  <div style={{color:C.secondary,fontSize:10,letterSpacing:"0.12em",marginBottom:5}}>{current.sub.toUpperCase()}</div>
                  <div style={{color:C.primary,fontWeight:700,fontSize:21,letterSpacing:-0.3,lineHeight:1.15,marginBottom:8}}>{current.name}</div>
                  <p style={{color:C.secondary,fontSize:12,lineHeight:1.7,margin:"0 0 12px"}}>{current.desc}</p>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",gap:5}}>
                      {current.tags.slice(0,2).map((t,i)=><span key={t} style={{background:i===0?C.primary:"transparent",color:i===0?"#000":C.secondary,border:i===0?"none":"1px solid "+C.border,borderRadius:2,padding:"3px 8px",fontSize:9,letterSpacing:"0.06em",fontWeight:i===0?600:400}}>{t.toUpperCase()}</span>)}
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{color:C.primary,fontWeight:700,fontSize:14}}>{current.price}</div>
                      <div style={{color:C.tertiary,fontSize:10,marginTop:1}}>{current.meta}</div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
        {/* Buttons */}
        <div style={{padding:"14px 24px 28px",display:"flex",alignItems:"center",justifyContent:"center",gap:20,flexShrink:0}}>
          <button onMouseEnter={()=>{if(!isMDrag.current)setHintDir("left");}} onMouseLeave={()=>{if(!isMDrag.current)setHintDir(null);}} onClick={()=>doSwipe("left")} onMouseDown={e=>e.stopPropagation()}
            style={{width:50,height:50,borderRadius:"50%",background:"transparent",border:"1.5px solid "+(dragX<-20?C.borderHi:C.border),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transform:"scale("+(1+(dragX<0?Math.min(Math.abs(dragX)/80,1)*0.3:0))+")",transition:"transform 0.05s,border-color 0.15s",boxShadow:dragX<-20?"0 0 20px rgba(255,255,255,"+(Math.min(Math.abs(dragX)/80,1)*0.15)+")":"none"}}>
            <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke={dragX<-20?"#bbb":"#777"} strokeWidth="1.8" strokeLinecap="round"/></svg>
          </button>
          <button onMouseEnter={()=>{if(!isMDrag.current)setHintDir("right");}} onMouseLeave={()=>{if(!isMDrag.current)setHintDir(null);}} onClick={()=>doSwipe("right")} onMouseDown={e=>e.stopPropagation()}
            style={{width:64,height:64,borderRadius:"50%",background:C.primary,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transform:"scale("+(1+(dragX>0?Math.min(dragX/80,1)*0.3:0))+")",transition:"transform 0.05s",boxShadow:"0 8px 28px rgba(255,255,255,"+(0.14+Math.min(Math.max(dragX,0)/80,1)*0.3)+")"}}>
            <svg width="22" height="18" viewBox="0 0 24 18" fill="none"><path d="M2 9L9 16L22 2" stroke="#000" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div style={{width:50,height:50,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:C.tertiary,fontWeight:600,fontSize:11}}>{(ci%safeLen)+1}<span style={{color:C.muted}}>/{filtered.length}</span></span>
          </div>
        </div>
      </div>

      {/* Filter backdrop */}
      <div onClick={()=>setSheetOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",opacity:sheetOpen?1:0,pointerEvents:sheetOpen?"auto":"none",transition:"opacity 0.3s",zIndex:40}}/>
      {/* Filter sheet */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%) translateY("+(sheetOpen?"0":"100%")+")",width:"100%",maxWidth:440,background:"#0e0e0e",borderRadius:"18px 18px 0 0",border:"1px solid "+C.border,borderBottom:"none",zIndex:50,transition:"transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94)",maxHeight:"78vh",overflowY:"auto",scrollbarWidth:"none"}}>
        <div style={{display:"flex",justifyContent:"center",paddingTop:14,paddingBottom:2}}>
          <div style={{width:32,height:3,borderRadius:2,background:C.border}}/>
        </div>
        <div style={{padding:"10px 24px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+C.border}}>
          <span style={{color:C.primary,fontWeight:700,fontSize:15,fontFamily:F}}>Filters</span>
          <button onClick={()=>setFilters({city:"Detroit"})} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",letterSpacing:"0.08em",fontFamily:F}}>RESET ALL</button>
        </div>
        <div style={{padding:"16px 24px 48px"}}>
          {fDefs.map((fd,si)=>(
            <div key={fd.key} style={{marginBottom:22,paddingBottom:22,borderBottom:si<fDefs.length-1?"1px solid "+C.border:"none"}}>
              <div style={{color:C.secondary,fontSize:11,letterSpacing:"0.1em",marginBottom:12,fontFamily:F}}>{fd.label.toUpperCase()}</div>
              {fd.type==="calendar"
                ?<MiniCalendar mode={fd.mode} value={filters[fd.key]||{}} onChange={v=>setFilters(f=>({...f,[fd.key]:v}))}/>
                :<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {fd.options.map(opt=>{const active=filters[fd.key]===opt;return <button key={opt} onClick={()=>setFilter(fd.key,opt)} style={{background:active?C.primary:"transparent",color:active?"#000":C.secondary,border:"1px solid "+(active?C.primary:C.border),borderRadius:2,padding:"7px 14px",fontSize:12,cursor:"pointer",fontFamily:F,fontWeight:active?600:400,whiteSpace:"nowrap",transition:"all 0.15s"}}>{opt}</button>;})}
                </div>
              }
            </div>
          ))}
        </div>
      </div>

      {/* Detail sheet */}
      <DetailSheet item={current} cat={activeCat} open={detailOpen} onClose={()=>setDetailOpen(false)}
        onLeft={()=>{setDetailOpen(false);setTimeout(()=>doSwipe("left"),50);}}
        onRight={()=>{setDetailOpen(false);setTimeout(()=>doSwipe("right"),50);}}
      />

      {/* Booking overlay */}
      {booked&&(
        <div style={{position:"fixed",inset:0,background:BG,zIndex:80,display:"flex",flexDirection:"column",alignItems:"center",overflowY:"auto"}}>
          <div style={{width:"100%",maxWidth:440,padding:"0 24px",flex:1,display:"flex",flexDirection:"column",boxSizing:"border-box"}}>
            <div style={{padding:"22px 0 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:C.primary,fontWeight:700,fontSize:17,letterSpacing:"0.18em"}}>SCOUT</span>
              <button onClick={()=>{setBooked(null);setSelTime(null);}} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",letterSpacing:"0.08em",fontFamily:F}}>← BACK</button>
            </div>
            <div style={{marginBottom:24}}>
              <div style={{color:C.secondary,fontSize:10,letterSpacing:"0.18em",marginBottom:12,fontFamily:F}}>{CONF_LABEL[activeCat]}</div>
              <h2 style={{color:C.primary,fontSize:42,fontWeight:700,margin:0,letterSpacing:-1.5,fontFamily:F}}>You're in.</h2>
            </div>
            <div style={{position:"relative",height:220,borderRadius:10,overflow:"hidden",marginBottom:24}}>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(160deg,"+booked.color+",#020202)"}}/>
              <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.95),rgba(0,0,0,0.1))"}}/>
              <div style={{position:"absolute",bottom:0,left:0,right:0,padding:20}}>
                <div style={{color:C.secondary,fontSize:10,letterSpacing:"0.1em",marginBottom:4,fontFamily:F}}>{filters.city} · {booked.sub}</div>
                <div style={{color:C.primary,fontWeight:700,fontSize:20,fontFamily:F}}>{booked.name}</div>
                <div style={{color:C.primary,fontWeight:700,fontSize:13,marginTop:6,fontFamily:F}}>{booked.price}</div>
              </div>
            </div>
            <div style={{marginBottom:24}}>
              <div style={{color:C.secondary,fontSize:10,letterSpacing:"0.1em",marginBottom:12,fontFamily:F}}>SELECT TIME</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {(activeCat==="hotels"?["Check-in 3PM","Check-in 4PM"]:["12:00 PM","6:00 PM","7:30 PM","9:00 PM"]).map(t=>(
                  <button key={t} onClick={()=>setSelTime(t)} style={{background:selTime===t?C.primary:"transparent",color:selTime===t?"#000":C.secondary,border:"1px solid "+(selTime===t?C.primary:C.border),borderRadius:2,padding:"10px 16px",fontSize:12,fontFamily:F,cursor:"pointer",fontWeight:selTime===t?600:400,transition:"all 0.15s"}}>{t}</button>
                ))}
              </div>
            </div>
            {selTime&&(
              <div style={{borderLeft:"2px solid "+C.primary,paddingLeft:16,marginBottom:28}}>
                <div style={{color:C.primary,fontWeight:700,fontSize:14,fontFamily:F}}>Locked in · {selTime}</div>
                <div style={{color:C.tertiary,fontSize:12,marginTop:4,fontFamily:F}}>Confirmation sent to your phone</div>
              </div>
            )}
            <div style={{flex:1}}/>
            <button onClick={()=>{setBooked(null);setSelTime(null);}} style={{width:"100%",padding:"14px",borderRadius:2,background:"transparent",color:C.tertiary,border:"1px solid "+C.border,fontSize:11,cursor:"pointer",fontFamily:F,letterSpacing:"0.1em",marginBottom:24}}>{CTA_LABEL[activeCat]}</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
